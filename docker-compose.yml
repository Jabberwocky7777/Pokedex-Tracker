services:
  pokedex-tracker:
    image: ghcr.io/jabberwocky7777/pokedex-tracker:latest
    container_name: pokedex-tracker
    restart: unless-stopped
    ports:
      - "7777:80"
    env_file:
      - .env           # SYNC_TOKEN=your-secret-here
    volumes:
      - sync-data:/data

volumes:
  sync-data:           # persists sync.json across container restarts
