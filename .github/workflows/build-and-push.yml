name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  # Allow a manual rebuild from the GitHub Actions UI (useful for forcing a
  # redeploy without a code change, e.g. after updating Pokémon data locally).
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Resolves to "jabberwocky7777/pokedex-tracker" automatically.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # Required to push to GitHub Container Registry.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag as "latest" on every push to main — this is what TrueNAS pulls.
            type=raw,value=latest,enable={{is_default_branch}}
            # Also tag with a short git SHA for traceability.
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache Docker layers in GitHub Actions Cache.
          # On the first run this saves the node_modules install layer.
          # Subsequent builds reuse that cache and finish in ~45 seconds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # TrueNAS SCALE runs on x86-64. Add linux/arm64 here if you also
          # want to run the image on ARM hardware (doubles build time).
          platforms: linux/amd64
