server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Runtime config (env.js) ───────────────────────────────────────────────
    # Written by docker-entrypoint.sh from SYNC_TOKEN env var at container startup.
    # No-cache so token changes take effect on next page refresh.
    # Returns an empty 200 if the file doesn't exist (sync disabled gracefully).
    location = /env.js {
        root /usr/share/nginx/env;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /env.js =200;
    }

    # ── Sync API proxy ────────────────────────────────────────────────────────
    # The sync server runs on port 3001 inside the same container.
    # Proxied through nginx so browser requests stay same-origin (no CORS needed).
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # ── Hashed assets (JS, CSS, images, fonts) ────────────────────────────────
    # Vite appends a content hash to every asset filename (e.g. index-BVB3d2I4.js),
    # so a 1-year immutable cache is safe — the filename changes when content changes.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Pokémon data file ──────────────────────────────────────────────────────
    location = /data/pokemon.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
