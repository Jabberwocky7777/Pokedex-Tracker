services:
  pokedex-tracker:
    image: ghcr.io/jabberwocky7777/pokedex-tracker:latest
    container_name: pokedex-tracker
    restart: unless-stopped
    ports:
      - "7777:80"
    env_file:
      - .env           # SYNC_TOKEN=your-secret, SYNC_URL= (empty = use nginx proxy)
    depends_on:
      - pokedex-sync

  pokedex-sync:
    image: ghcr.io/jabberwocky7777/pokedex-sync:latest
    container_name: pokedex-sync
    restart: unless-stopped
    ports:
      - "7778:3001"
    env_file:
      - .env           # same SYNC_TOKEN used here for auth validation
    environment:
      PORT: "3001"
    volumes:
      - sync-data:/data

volumes:
  sync-data:           # persists the sync.json snapshot across container restarts
